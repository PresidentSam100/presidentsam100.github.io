<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>LogicGate — Sam Lu</title>

    <meta property="og:title" content="LogicGate — Sam Lu" />
    <meta property="og:type" content="website" />
    <meta
      property="og:description"
      content="A logic-circuit puzzle: drag AND, OR, XOR, NAND, NOR and XNOR gates into the empty slots so the wired inputs light the bulb."
    />
    <meta name="author" content="Sam Lu" />
    <meta
      name="description"
      content="Drag logic gates to wire up the circuit and light the bulb."
    />
    <meta name="twitter:card" content="summary" />

    <link rel="stylesheet" href="../../style.css" />
    <link rel="stylesheet" href="styles.css" />

    <!-- Apply the saved theme before first paint to avoid a flash. -->
    <script>
      try {
        var _t = localStorage.getItem("logicgate_theme");
        if (_t) document.documentElement.setAttribute("data-theme", _t);
      } catch (e) {}
    </script>

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-H1K8QYFCV5"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-H1K8QYFCV5");
    </script>

    <!-- Shared per-game toggles: ✨ Visual FX (reduce motion) + 🔊 mute. -->
    <script src="../motion-toggle.js"></script>
    <script src="../mute-toggle.js"></script>
  </head>

  <body>
    <div class="wrap">
      <a href="../" class="back-link nav-back-games" aria-label="Back to games">← Games</a>

      <header class="lg-header">
        <h1 class="lg-title">LOGIC<b>GATE</b></h1>
        <p class="subtitle">
          Drag gates into the empty slots so a <b>1</b> travels down the wires
          and lights the bulb.
        </p>
      </header>

      <div class="mode-bar" id="modeBar"></div>

      <div class="hud">
        <span id="levelName">Level 1</span>
        <span id="status"></span>
      </div>

      <div id="board">
        <svg id="wires" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="nodes"></div>
      </div>

      <div id="palette"></div>

      <div id="hint"></div>

      <div class="controls">
        <button class="btn" id="prevBtn" type="button">← Prev</button>
        <button class="btn" id="resetBtn" type="button">↻ Reset</button>
        <button class="btn" id="hintBtn" type="button">💡 Hint</button>
        <button class="btn" id="helpBtn" type="button">? Gates</button>
        <button class="btn primary" id="nextBtn" type="button">Next →</button>
      </div>

      <div class="theme-bar" id="themeBar"></div>

      <div id="levelDots"></div>

      <div id="helpPanel"></div>
    </div>

    <div id="winBanner">
      <span id="winMsg">Nice solve!</span>
      <button class="btn primary" id="winNext" type="button">Next level →</button>
    </div>

    <script src="game.js"></script>
  </body>
</html>
