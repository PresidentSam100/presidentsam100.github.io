<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GALAGA</title>
<link rel="stylesheet" href="styles.css" />
<script src="../motion-toggle.js"></script>
<script src="../mute-toggle.js"></script>
</head>
<body>
<a href="../" class="nav-back-games" aria-label="Back to games" style="position:fixed;top:12px;left:12px;z-index:99999;text-decoration:none;font:700 12px/1 'Courier New',monospace;letter-spacing:1.5px;color:#18e0ff;background:rgba(8,4,20,.85);border:1px solid #18e0ff;border-radius:6px;padding:8px 12px;box-shadow:0 0 12px rgba(24,224,255,.4)">&larr; Games</a>
  <div id="cabinet">
    <div id="marquee">G A L A G A</div>
    <canvas id="screen" width="448" height="576" tabindex="0"
            role="application" aria-label="Galaga game"></canvas>
    <!-- screen-reader announcements (game state, stage, score, etc.) -->
    <div id="sr" aria-live="polite" class="sr-only"></div>
    <div id="controls">
      <div class="ctl">
        <span class="keys"><kbd>&larr;</kbd><kbd>&rarr;</kbd><span class="alt">or</span><kbd>A</kbd><kbd>D</kbd></span>
        <span class="lbl">Move</span>
      </div>
      <div class="ctl">
        <span class="keys"><kbd>Space</kbd></span>
        <span class="lbl">Fire</span>
      </div>
      <div class="ctl">
        <span class="keys"><kbd>Enter</kbd></span>
        <span class="lbl">Start</span>
      </div>
      <div class="ctl">
        <span class="keys"><kbd>P</kbd></span>
        <span class="lbl">Pause Menu</span>
      </div>
    </div>
    <div id="touch-controls" aria-hidden="true">
      <button id="t-left" class="tbtn" aria-label="Move left">◀</button>
      <button id="t-fire" class="tbtn fire" aria-label="Fire">●</button>
      <button id="t-right" class="tbtn" aria-label="Move right">▶</button>
    </div>
  </div>

<script src="game.js"></script>
</body>
</html>
