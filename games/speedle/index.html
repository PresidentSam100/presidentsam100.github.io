    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap");

    :root {
      --bg: #0c0e15; --panel: #141826; --text: #eef2f9; --muted: #8b93a7;
      --accent: #22a8f5; --good: #46e6a0; --warn: #ffd23f; --bad: #ff5d6c; --line: #232838;
      --green: #4cae4f; --yellow: #d3ad3a; --gray: #3a4055;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      background: radial-gradient(1200px 700px at 50% -10%, #161b2c 0%, var(--bg) 60%);
      color: var(--text); font-family: "Inter", system-ui, sans-serif;
      min-height: 100%; display: flex; flex-direction: column; align-items: center;
      padding: 1rem; overflow-x: hidden;
    }
    a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .wrap { width: 100%; max-width: 500px; margin: 0 auto; flex: 1; display: flex; flex-direction: column; }

    header.top { text-align: center; margin: 0.6rem 0 0.2rem; }
    header.top h1 { font-size: 1.9rem; font-weight: 900; margin: 0; letter-spacing: -0.02em; }
    header.top p { margin: 0.25rem 0 0; color: var(--muted); font-size: 0.85rem; }

    .hud { display: flex; gap: 0.5rem; margin: 0.8rem 0 0.2rem; }
    .stat { position: relative; flex: 1; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 0.5rem; text-align: center; }
    .stat .label { font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
    .stat .value { font-size: 1.35rem; font-weight: 800; font-variant-numeric: tabular-nums; margin-top: 1px; }
    .stat.warn .value { color: var(--bad); }

    /* floating bonus that rises out of a stat on each solve:
       "+10s" out of Time (Sprint), "+1" out of Solved (every mode) */
    .time-bonus, .score-bonus {
      position: absolute; left: 0; right: 0; top: -0.5rem; text-align: center;
      color: var(--good); font-weight: 900; font-size: 1rem; font-variant-numeric: tabular-nums;
      pointer-events: none; opacity: 0; text-shadow: 0 1px 6px rgba(70,230,160,0.45);
    }
    .time-bonus.show, .score-bonus.show { animation: bonusRise 0.9s ease forwards; }
    @keyframes bonusRise {
      0% { opacity: 0; transform: translateY(8px) scale(0.8); }
      18% { opacity: 1; transform: translateY(0) scale(1.12); }
      55% { opacity: 1; transform: translateY(-8px) scale(1); }
      100% { opacity: 0; transform: translateY(-22px) scale(0.95); }
    }

    /* board */
    .board { display: grid; grid-template-rows: repeat(6, 1fr); gap: 6px; margin: 0.9rem auto 0; width: 100%; max-width: 330px; }
    .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .tile {
      aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem; font-weight: 800; text-transform: uppercase; border-radius: 6px;
      border: 2px solid var(--line); background: transparent; color: var(--text);
      user-select: none;
    }
    .tile.filled { border-color: #4a5169; }
    .tile.green { background: var(--green); border-color: var(--green); color: #fff; }
    .tile.yellow { background: var(--yellow); border-color: var(--yellow); color: #fff; }
    .tile.gray { background: var(--gray); border-color: var(--gray); color: #cdd3e2; }
    .tile.pop { animation: pop 0.1s ease; }
    @keyframes pop { 50% { transform: scale(1.08); } }
    .row.shake { animation: shake 0.34s ease; }
    @keyframes shake { 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)} 30%,50%,70%{transform:translateX(-7px)} 40%,60%{transform:translateX(7px)} }
    .tile.flip { animation: flip 0.3s ease; }
    @keyframes flip { 0%{transform:rotateX(0)} 50%{transform:rotateX(90deg)} 100%{transform:rotateX(0)} }

    .msg { text-align: center; min-height: 1.3rem; margin: 0.5rem 0 0; font-size: 0.9rem; font-weight: 700; color: var(--warn); }

    /* keyboard */
    .kb { margin-top: auto; padding-top: 0.6rem; display: flex; flex-direction: column; gap: 6px; }
    .kb-row { display: flex; gap: 5px; justify-content: center; }
    .key {
      flex: 1; min-width: 0; height: 48px; border: none; border-radius: 6px;
      background: #2a3043; color: var(--text); font-family: inherit; font-weight: 700;
      font-size: 0.95rem; text-transform: uppercase; cursor: pointer; user-select: none;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s ease, filter 0.1s ease;
    }
    .key.wide { flex: 1.5; font-size: 0.72rem; }
    .key:active { filter: brightness(1.2); }
    .key.green { background: var(--green); color: #fff; }
    .key.yellow { background: var(--yellow); color: #fff; }
    .key.gray { background: var(--gray); color: #888fa3; }

    /* overlay card */
    .overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(8,10,16,0.85); backdrop-filter: blur(3px); z-index: 20; padding: 1rem; }
    .overlay.show { display: flex; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 18px; padding: 1.6rem 1.4rem; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 24px 60px -20px rgba(0,0,0,0.7); }
    .card h2 { margin: 0 0 0.3rem; font-size: 1.8rem; font-weight: 900; }
    .card p { color: var(--muted); margin: 0.35rem 0; line-height: 1.5; font-size: 0.92rem; }
    .card .big { font-size: 3rem; font-weight: 900; margin: 0.4rem 0 0.1rem; font-variant-numeric: tabular-nums; }
    .card .big small { font-size: 1.1rem; color: var(--muted); font-weight: 700; }
    .rules { text-align: left; font-size: 0.86rem; color: var(--muted); line-height: 1.55; margin: 0.6rem 0 1rem; padding-left: 1.1rem; }
    .rules li { margin: 0.25rem 0; }
    .modes { display: flex; gap: 0.6rem; margin: 0.9rem 0 0.3rem; }
    .mode-btn {
      flex: 1; cursor: pointer; background: #1b2030; color: var(--text); border: 1px solid var(--line);
      border-radius: 12px; padding: 0.9rem 0.6rem; font-family: inherit; text-align: center;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.08s ease;
    }
    .mode-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
    .mode-btn .t { font-size: 1.05rem; font-weight: 800; }
    .mode-btn .d { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }
    .mode-btn .b { font-size: 0.72rem; color: var(--good); margin-top: 0.35rem; font-weight: 700; min-height: 0.9rem; }
    .btn { cursor: pointer; background: var(--accent); color: #04121f; border: none; border-radius: 10px; padding: 0.8rem 1.6rem; font-family: inherit; font-size: 1.05rem; font-weight: 800; transition: filter 0.15s ease, transform 0.08s ease; }
    .btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .btn:active { transform: scale(0.97); }
    .btn.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); font-size: 0.9rem; padding: 0.6rem 1.2rem; margin-top: 0.5rem; }

    .overlay.show .card { animation: cardRise 0.34s cubic-bezier(0.2,0.8,0.2,1) both; }
    @keyframes cardRise { from { opacity: 0; transform: translateY(16px) scale(0.97); } to { opacity: 1; transform: none; } }

    @media (max-height: 720px) {
      .board { max-width: 280px; }
      .tile { font-size: 1.4rem; }
      .key { height: 42px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }

      boardEl.innerHTML = "";
      tileEls = []; grid = [];
      for (var r = 0; r < MAX_GUESSES; r++) {
        var row = document.createElement("div");
        row.className = "row";
        var rowTiles = [];
        for (var c = 0; c < 5; c++) {
          var t = document.createElement("div");
          t.className = "tile";
          row.appendChild(t);
          rowTiles.push(t);
        }
        boardEl.appendChild(row);
        tileEls.push(rowTiles);
        grid.push(["", "", "", "", ""]);
      }
    }

    function resetKeyboardTint() {
      letterState = {};
      for (var k in keyEls) { keyEls[k].className = "key"; }
    }

    function newWord() {
      answer = WORDS[(Math.random() * WORDS.length) | 0];
      rowIdx = 0; colIdx = 0; locked = false;
      buildBoard();
      resetKeyboardTint();
      setMsg(""); // clear the previous ✓/✗ result the moment the next word loads
    }

    function setMsg(text, color) {
      msgEl.textContent = text || "";
      msgEl.style.color = color || "var(--warn)";
    }

    // float a "+10s" up out of the Time stat (restart the animation each call)
    function showTimeBonus() {
      timeBonus.textContent = "+" + SPRINT_BONUS + "s";
      timeBonus.classList.remove("show");
      void timeBonus.offsetWidth; // force reflow so the animation replays
      timeBonus.classList.add("show");
    }

    // float a "+1" up out of the Solved stat on every correct word
    function showScoreBonus() {
      scoreBonus.textContent = "+1";
      scoreBonus.classList.remove("show");
      void scoreBonus.offsetWidth; // force reflow so the animation replays
      scoreBonus.classList.add("show");
    }

    // ----- timer / hud --------------------------------------------------
    function fmt(ms) {
      var s = ms / 1000;
      return s.toFixed(1);
    }
    function renderBest() {
      if (mode === "sprint") {
        var b = parseInt(load(BEST_SPRINT), 10) || 0;
        valueBest.textContent = b ? String(b) : "—";
      } else {
        var r = parseInt(load(BEST_RACE), 10) || 0;
        valueBest.textContent = r ? fmt(r) + "s" : "—";
      }
    }
    function tick() {
      if (!playing) return;
      var now = performance.now();
      if (mode === "sprint") {
        var left = Math.max(0, sprintDeadline - now);
        valueA.textContent = (left / 1000).toFixed(1);
        statA.classList.toggle("warn", left <= 5000);
        // final-5-seconds countdown: one beep as each of 5,4,3,2,1 begins
        var secLeft = Math.ceil(left / 1000);
        if (secLeft > 5) {
          lastCountSec = 0; // armed again once we're back above 5s (e.g. after a +10s solve)
        } else if (secLeft >= 1 && secLeft !== lastCountSec) {
          lastCountSec = secLeft;
          SND.count(secLeft);
        }
        if (left <= 0) { sprintTimeUp(); return; }
      } else {
        valueA.textContent = ((now - startTime) / 1000).toFixed(1);
      }
      timerRAF = requestAnimationFrame(tick);
    }

    // ----- input --------------------------------------------------------
    function handleKey(code) {
      if (!playing || locked) return;
      if (code === "enter") { submit(); return; }
      if (code === "back") {
        if (colIdx > 0) {
          colIdx--;
          grid[rowIdx][colIdx] = "";
          var t = tileEls[rowIdx][colIdx];
          t.textContent = ""; t.classList.remove("filled");
        }
        return;
      }
      if (/^[a-z]$/.test(code) && colIdx < 5) {
        grid[rowIdx][colIdx] = code;
        var tile = tileEls[rowIdx][colIdx];
        tile.textContent = code;
        tile.classList.add("filled", "pop");
        setTimeout((function (el) { return function () { el.classList.remove("pop"); }; })(tile), 100);
        colIdx++;
        SND.key();
      }
    }

    function submit() {
      if (colIdx < 5) { rowShake(); setMsg("not enough letters"); return; }
      var guess = grid[rowIdx].join("");
      if (!WORDSET[guess]) { rowShake(); setMsg("not in word list"); SND.bad(); return; }
      setMsg("");

      // score the guess (handles duplicate letters correctly)
      var result = scoreGuess(guess, answer);
      paintRow(rowIdx, guess, result);

      if (guess === answer) { wordSolved(); return; }

      rowIdx++; colIdx = 0;
      if (rowIdx >= MAX_GUESSES) { wordFailed(); }
    }

    function scoreGuess(guess, ans) {
      var res = ["gray", "gray", "gray", "gray", "gray"];
      var counts = {};
      var i;
      for (i = 0; i < 5; i++) counts[ans[i]] = (counts[ans[i]] || 0) + 1;
      for (i = 0; i < 5; i++) { if (guess[i] === ans[i]) { res[i] = "green"; counts[guess[i]]--; } }
      for (i = 0; i < 5; i++) {
        if (res[i] === "green") continue;
        if (counts[guess[i]] > 0) { res[i] = "yellow"; counts[guess[i]]--; }
      }
      return res;
    }

    function paintRow(r, guess, result) {
      for (var c = 0; c < 5; c++) {
        var t = tileEls[r][c];
        t.classList.add(result[c], "flip");
        (function (el) { setTimeout(function () { el.classList.remove("flip"); }, 300); })(t);
        // keyboard tint: green > yellow > gray, never downgrade
        var ch = guess[c], cur = letterState[ch];
        var rank = { green: 3, yellow: 2, gray: 1 };
        if (!cur || rank[result[c]] > rank[cur]) {
          letterState[ch] = result[c];
          if (keyEls[ch]) keyEls[ch].className = "key " + result[c];
        }
      }
    }

    function rowShake() {
      var row = boardEl.children[rowIdx];
      if (!row) return;
      row.classList.add("shake");
      setTimeout(function () { row.classList.remove("shake"); }, 340);
    }

    // ----- word resolution ---------------------------------------------
    function wordSolved() {
      locked = true;
      // Sprint: bank the +10s the instant the word is correct — before the
      // score/sound/animation work — so a solve landing right as the clock
      // nears 0 always counts and can never trip the time-up (✗ / game-over)
      // path. This runs synchronously inside submit(), so the extended deadline
      // is in place before the next timer tick can check it.
      if (mode === "sprint") {
        sprintDeadline += SPRINT_BONUS * 1000;
        showTimeBonus();
      }
      solved++;
      valueSolved.textContent = String(solved);
      showScoreBonus();
      SND.solve();
      if (mode === "race" && solved >= RACE_TARGET) {
        // freeze the clock at the winning instant, then let the final solve
        // (green tiles + "+1") play before the end screen covers the board
        raceFinishMs = Math.round(performance.now() - startTime);
        playing = false;
        cancelAnimationFrame(timerRAF);
        valueA.textContent = fmt(raceFinishMs);
        setMsg("✓ " + answer.toUpperCase(), "var(--good)");
        setTimeout(endGame, 900);
        return;
      }
      setMsg("✓ " + answer.toUpperCase(), "var(--good)");
      setTimeout(function () { newWord(); }, 450);
    }

    function wordFailed() {
      locked = true;
      SND.fail();
      setMsg("✗ " + answer.toUpperCase(), "var(--bad)");
      // small breather, then a fresh word (no credit). Sprint: clock keeps running.
      setTimeout(function () { newWord(); }, 900);
    }

    // Sprint clock hit zero mid-word: stop the timer and reveal the unsolved
    // answer in red with ✗ (same as a 6-guess miss) before the end screen shows.
    function sprintTimeUp() {
      playing = false;
      cancelAnimationFrame(timerRAF);
      locked = true;
      valueA.textContent = "0.0";
      statA.classList.add("warn");
      SND.fail();
      setMsg("✗ " + answer.toUpperCase(), "var(--bad)");
      setTimeout(endGame, 1100);
    }

    // ----- start / end --------------------------------------------------
    function startGame(m) {
      mode = m;
      playing = true;
      solved = 0;
      raceFinishMs = null;
      valueSolved.textContent = "0";
      labelA.textContent = mode === "sprint" ? "Time left" : "Time";
      labelBest.textContent = mode === "sprint" ? "Best (words)" : "Best (time)";
      statA.classList.remove("warn");
      lastCountSec = 0;
      renderBest();
      ov.classList.remove("show");
      ac(); // unlock audio within the user gesture
      startTime = performance.now();
      sprintDeadline = startTime + SPRINT_SECONDS * 1000;
      valueA.textContent = mode === "sprint" ? SPRINT_SECONDS.toFixed(1) : "0.0";
      newWord();
      setMsg("");
      cancelAnimationFrame(timerRAF);
      timerRAF = requestAnimationFrame(tick);
    }

    function endGame() {
      playing = false;
      cancelAnimationFrame(timerRAF);
      SND.over();
      var record = false, line2 = "";
      if (mode === "sprint") {
        var best = parseInt(load(BEST_SPRINT), 10) || 0;
        if (solved > best) { best = solved; save(BEST_SPRINT, best); record = true; }
        line2 = record ? "🏆 new best!" : "best " + best + " word" + (best === 1 ? "" : "s");
        card.innerHTML =
          '<h2>Time!</h2>' +
          '<div class="big">' + solved + '<small> word' + (solved === 1 ? '' : 's') + '</small></div>' +
          '<p style="font-weight:800;color:' + (record ? 'var(--good)' : 'var(--muted)') + ';margin-top:0;">' + line2 + '</p>' +
          '<p>' + SPRINT_SECONDS + 's start · +' + SPRINT_BONUS + 's per word</p>' +
          '<button class="btn" id="btn-again">Play again</button>' +
          '<br><button class="btn ghost" id="btn-menu">Change mode</button>';
      } else {
        var elapsed = (raceFinishMs != null) ? raceFinishMs : Math.round(performance.now() - startTime);
        var done = solved >= RACE_TARGET;
        var bestR = parseInt(load(BEST_RACE), 10) || 0;
        if (done && (bestR === 0 || elapsed < bestR)) { bestR = elapsed; save(BEST_RACE, bestR); record = true; }
        line2 = record ? "🏆 new best time!" : (bestR ? "best " + fmt(bestR) + "s" : "");
        card.innerHTML =
          '<h2>' + (done ? 'Finished!' : 'Stopped') + '</h2>' +
          '<div class="big">' + fmt(elapsed) + '<small>s</small></div>' +
          '<p style="font-weight:800;color:' + (record ? 'var(--good)' : 'var(--muted)') + ';margin-top:0;">' + line2 + '</p>' +
          '<p>' + solved + ' of ' + RACE_TARGET + ' words</p>' +
          '<button class="btn" id="btn-again">Play again</button>' +
          '<br><button class="btn ghost" id="btn-menu">Change mode</button>';
      }
      ov.classList.add("show");
      $("btn-again").addEventListener("click", function () { startGame(mode); });
      $("btn-menu").addEventListener("click", showMenu);
    }

    // ----- menu ---------------------------------------------------------
    function showMenu() {
      playing = false;
      cancelAnimationFrame(timerRAF);
      var bestS = parseInt(load(BEST_SPRINT), 10) || 0;
      var bestR = parseInt(load(BEST_RACE), 10) || 0;
      card.innerHTML =
        '<h2>🔤 Speedle</h2>' +
        '<p>Wordle, against the clock. Solve 5-letter words back-to-back — each solve loads the next instantly.</p>' +
        '<ul class="rules">' +
          '<li>🟩 right letter, right spot</li>' +
          '<li>🟨 right letter, wrong spot</li>' +
          '<li>⬛ letter not in the word</li>' +
          '<li>' + MAX_GUESSES + ' guesses each — miss all ' + MAX_GUESSES + ' and it skips, no credit.</li>' +
        '</ul>' +
        '<div class="modes">' +
          '<button class="mode-btn" id="m-sprint"><div class="t">⏱️ Sprint</div><div class="d">' + SPRINT_SECONDS + 's start, +' + SPRINT_BONUS + 's per word</div><div class="b">' + (bestS ? 'best ' + bestS : '') + '</div></button>' +
          '<button class="mode-btn" id="m-race"><div class="t">🏁 Race to ' + RACE_TARGET + '</div><div class="d">' + RACE_TARGET + ' words, fastest time</div><div class="b">' + (bestR ? 'best ' + fmt(bestR) + 's' : '') + '</div></button>' +
        '</div>';
      ov.classList.add("show");
      $("m-sprint").addEventListener("click", function () { startGame("sprint"); });
      $("m-race").addEventListener("click", function () { startGame("race"); });
    }

    // ----- physical keyboard -------------------------------------------
    document.addEventListener("keydown", function (e) {
      if (ov.classList.contains("show")) {
        if (e.key === "Enter") { var b = card.querySelector(".btn"); if (b) { e.preventDefault(); b.click(); } }
        return;
      }
      if (e.key === "Enter") { e.preventDefault(); handleKey("enter"); }
      else if (e.key === "Backspace") { e.preventDefault(); handleKey("back"); }
      else if (/^[a-zA-Z]$/.test(e.key)) { handleKey(e.key.toLowerCase()); }
    });

    // ----- boot ---------------------------------------------------------
    buildKeyboard();
    buildBoard();
    showMenu();
  })();
  </script>
</body>
</html>
