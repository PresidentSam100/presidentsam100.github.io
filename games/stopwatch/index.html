<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Stopwatch — Sam Lu</title>
  <meta name="description" content="Stop the hidden clock as close to the target as you can. A precision timing game by Sam Lu." />

  <!-- Google tag (gtag.js) -->

  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag("js", new Date());

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap");

    :root {
      --bg: #17120e; --panel: #211a14; --text: #f6eee2; --muted: #a8977f;
      --accent: #ff9f1c; --good: #46e6a0; --warn: #ffd23f; --bad: #ff5d6c; --line: #332a20;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      background: radial-gradient(1200px 700px at 50% -10%, #2a201a 0%, var(--bg) 60%);
      color: var(--text); font-family: "Oswald", system-ui, sans-serif;
      min-height: 100%; display: flex; flex-direction: column; align-items: center;
      padding: 1rem; overflow-x: hidden;
    }
    a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .back-link { align-self: flex-start; font-size: 0.95rem; opacity: 0.85; position: relative; z-index: 30; }
    .wrap { width: 100%; max-width: 520px; margin: 0 auto; flex: 1; display: flex; flex-direction: column; }

    header.top { text-align: center; margin: 0.6rem 0 0.4rem; }
    header.top h1 { font-size: 1.9rem; font-weight: 900; margin: 0; letter-spacing: -0.02em; }
    header.top p { margin: 0.25rem 0 0; color: var(--muted); font-size: 0.85rem; }

    /* HUD */
    .hud { display: flex; gap: 0.6rem; margin: 0.9rem 0 0.2rem; }
    .stat { flex: 1; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 0.55rem 0.7rem; text-align: center; }
    .stat .label { font-size: 0.66rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
    .stat .value { font-size: 1.35rem; font-weight: 800; font-variant-numeric: tabular-nums; margin-top: 1px; }

    /* Budget meter */
    .budget { margin: 0.9rem 0 0.2rem; }
    .budget .row { display: flex; justify-content: space-between; align-items: baseline; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.32rem; }
    .budget .row b { color: var(--text); font-variant-numeric: tabular-nums; font-weight: 700; }
    .meter { height: 14px; background: #120d09; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
    .meter > span { display: block; height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--good), var(--warn) 70%, var(--bad)); transition: width 0.45s cubic-bezier(.2,.8,.2,1); }

    /* Main stage */
    .stage { position: relative; flex: 1; min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 0.6rem; }
    .target-line { color: var(--muted); font-size: 0.95rem; font-weight: 600; letter-spacing: 0.02em; min-height: 1.2em; }
    .target-big { font-size: 3.6rem; font-weight: 900; line-height: 1; letter-spacing: -0.03em; margin: 0.15rem 0 0.1rem; }
    .target-big small { font-size: 1.4rem; font-weight: 800; color: var(--muted); }
    .sub { color: var(--muted); font-size: 0.85rem; min-height: 1.2em; text-align: center; padding: 0 0.5rem; }

    .btn-main {
      margin-top: 1.3rem; width: 200px; height: 200px; border-radius: 50%;
      border: none; cursor: pointer; font-family: inherit; font-weight: 900;
      font-size: 1.7rem; letter-spacing: 0.06em; color: #2a1500;
      background: radial-gradient(120px 120px at 50% 35%, #ffc46b, var(--accent));
      box-shadow: 0 12px 40px -10px rgba(255,159,28,0.55), inset 0 -6px 18px rgba(0,0,0,0.25);
      transition: transform 0.08s ease, filter 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
      user-select: none; touch-action: manipulation;
    }
    .btn-main:active { transform: scale(0.96); }
    .btn-main.stop { color: #1a0608; background: radial-gradient(120px 120px at 50% 35%, #ff97a3, var(--bad)); box-shadow: 0 12px 40px -10px rgba(255,93,108,0.6), inset 0 -6px 18px rgba(0,0,0,0.25); }
    .btn-main.counting { animation: pulse 1.1s ease-in-out infinite; }
    .btn-main:disabled { opacity: 0.45; cursor: default; filter: grayscale(0.4); animation: none; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }

    /* Result readout */
    .result { min-height: 4.2rem; text-align: center; margin-top: 0.4rem; }
    .result .you { font-size: 2.1rem; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
    .result .delta { font-size: 1rem; font-weight: 700; margin-top: 0.1rem; }

    /* Big center overlay (countdown / game over) */
    .overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(8,10,16,0.82); backdrop-filter: blur(3px); z-index: 20; padding: 1rem; }
    .overlay.show { display: flex; }

    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 18px; padding: 1.6rem 1.4rem; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 24px 60px -20px rgba(0,0,0,0.7); }
    .card h2 { margin: 0 0 0.3rem; font-size: 1.9rem; font-weight: 900; }
    .card p { color: var(--muted); margin: 0.35rem 0; line-height: 1.5; font-size: 0.92rem; }
    .card .big { font-size: 3rem; font-weight: 900; margin: 0.4rem 0 0.1rem; }
    .card .big small { font-size: 1.1rem; color: var(--muted); font-weight: 700; }
    .bust { background: #1b1016; border: 1px solid #3a1f28; border-radius: 12px; padding: 0.7rem 0.8rem; font-size: 0.85rem; color: #ffb3bd; margin: 0.8rem 0; font-variant-numeric: tabular-nums; }
    .rules { text-align: left; font-size: 0.86rem; color: var(--muted); line-height: 1.55; margin: 0.6rem 0 1rem; }
    .rules li { margin: 0.25rem 0; }
    .btn {
      cursor: pointer; background: var(--accent); color: #2a1500; border: none; border-radius: 10px;
      padding: 0.8rem 1.6rem; font-family: inherit; font-size: 1.05rem; font-weight: 800;
      transition: filter 0.15s ease, transform 0.08s ease;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn:active { transform: scale(0.97); }
    .btn.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); font-weight: 700; font-size: 0.9rem; padding: 0.6rem 1rem; }

    /* mode picker on the start card */
    .modepick { display: flex; gap: 0.5rem; margin: 0.2rem 0 1rem; }
    .modebtn { flex: 1; cursor: pointer; background: #1a140e; border: 1px solid var(--line); color: var(--muted); border-radius: 10px; padding: 0.65rem 0.5rem; font-family: inherit; font-weight: 800; font-size: 0.95rem; transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease; }
    .modebtn.sel { border-color: var(--accent); color: var(--text); background: #2e2212; }
    .modebtn small { display: block; font-weight: 500; font-size: 0.68rem; color: var(--muted); margin-top: 2px; line-height: 1.3; }

    .footer-controls { display: flex; gap: 0.6rem; align-items: center; justify-content: center; margin: 0.8rem 0 0.4rem; }
    .mute { cursor: pointer; background: transparent; border: 1px solid var(--line); color: var(--muted); border-radius: 8px; padding: 0.35rem 0.6rem; font-size: 1rem; }
    .mode-pill { font-size: 0.78rem; font-weight: 700; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 0.3rem 0.7rem; }
    .hint { color: var(--muted); font-size: 0.78rem; text-align: center; margin-top: 0.2rem; }
    .hidden { display: none !important; }
    /* Accessibility: honor prefers-reduced-motion — neutralize animations,
     transitions, and motion effects (pulse, shake, drop, blink, glows). */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
  }
</style>
<script src="../motion-toggle.js"></script>
<script src="../mute-toggle.js"></script>
</head>
<body>
  <a href="../" class="nav-back-games" aria-label="Back to games" style="position:fixed;top:12px;left:12px;z-index:99999;text-decoration:none;font:700 13px/1 'Oswald',system-ui,sans-serif;color:#f6eee2;background:#211a14;border:1px solid #332a20;border-radius:8px;padding:8px 13px">&larr; Games</a>

  <div class="wrap">
    <header class="top">
      <h1>⏱ Stopwatch</h1>
      <p>stop the hidden clock as close to the target as you can</p>
    </header>

    <div class="hud">
      <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
      <div class="stat"><div class="label">Round</div><div class="value" id="round">—</div></div>
      <div class="stat"><div class="label">Best</div><div class="value" id="best">0</div></div>
    </div>

    <div class="budget">
      <div class="row"><span>Error budget used</span><span><b id="used">0.000</b> / 1.000 s</span></div>
      <div class="meter"><span id="meter-fill"></span></div>
      <div class="row" style="margin-top:0.32rem;"><span>Margin remaining</span><b id="margin">1.000 s</b></div>
    </div>

    <div class="stage">
      <div class="target-line" id="target-line">get ready…</div>
      <div class="target-big" id="target-big">—</div>
      <div class="sub" id="sub">press start to begin</div>

      <button class="btn-main" id="btn" disabled>START</button>

      <div class="result" id="result"></div>
    </div>

    <div class="footer-controls">
      <span class="mode-pill" id="mode-pill"></span>
    </div>
    <p class="hint">tap the button or press <b>Space</b> — start, then stop when you think the time is up</p>
  </div>

  <!-- Start / Game over overlay -->
  <div class="overlay show" id="overlay-card">
    <div class="card" id="card-inner"></div>
  </div>

  <script>
  (function () {
    "use strict";

    var BEST_KEY = "stopwatch_best";
    var LIMIT = 1.0;          // total error budget (seconds)
    var MIN_TARGET = 1, MAX_TARGET = 10;
    var EPS = 1e-9;

    // ---- elements ----
    var $ = function (id) { return document.getElementById(id); };
    var elScore = $("score"), elRound = $("round"), elBest = $("best");
    var elUsed = $("used"), elMargin = $("margin"), elFill = $("meter-fill");
    var elTargetLine = $("target-line"), elTargetBig = $("target-big"), elSub = $("sub");
    var elBtn = $("btn"), elResult = $("result");
    var ovCard = $("overlay-card"), cardInner = $("card-inner");
    var modePill = $("mode-pill");

    // ---- state ----
    var state = "menu";       // menu | counting | result | gameover (ready handled inline)
    var ready = false;        // true between rounds, waiting for START
    var roundNum = 0, score = 0, cumError = 0, target = 0, lastTarget = 0;
    var startStamp = 0, busy = false, rafId = 0;
    var visibleMode = false;  // false = clock hidden (estimate); true = clock shown (react)
    try { visibleMode = localStorage.getItem("stopwatch_mode") === "visible"; } catch (e) {}
    var best = parseInt(loadBest(), 10) || 0;

    function loadBest() { try { return localStorage.getItem(BEST_KEY) || "0"; } catch (e) { return "0"; } }
    function saveBest(v) { try { localStorage.setItem(BEST_KEY, String(v)); } catch (e) {} }

    // ---------------------------------------------------------- sound
    var Sound = {
      ctx: null, muted: false, // muting is handled globally by the shared toggle (mute-toggle.js)
      load: function () { this.muted = false; },
      init: function () { if (this.ctx) return; try { var AC = window.AudioContext || window.webkitAudioContext; this.ctx = new AC(); } catch (e) { this.ctx = null; } },
      beep: function (freq, dur, vol, type) {
        if (this.muted || !this.ctx) return;
        var t = this.ctx.currentTime, o = this.ctx.createOscillator(), g = this.ctx.createGain();
        o.type = type || "sine"; o.frequency.value = freq;
        g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(vol || 0.25, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t + (dur || 0.12));
        o.connect(g); g.connect(this.ctx.destination); o.start(t); o.stop(t + (dur || 0.12) + 0.02);
      },
      start: function () { this.beep(520, 0.08, 0.2, "sine"); },
      stop: function () { this.beep(300, 0.09, 0.22, "square"); },
      good: function () { this.beep(740, 0.1, 0.22, "triangle"); var s = this; setTimeout(function () { s.beep(1110, 0.12, 0.2, "triangle"); }, 90); },
      perfect: function () { var s = this; [740, 990, 1480].forEach(function (f, i) { setTimeout(function () { s.beep(f, 0.12, 0.2, "triangle"); }, i * 80); }); },
      fail: function () { this.beep(200, 0.4, 0.3, "sawtooth"); this.beep(120, 0.45, 0.18, "square"); },
    };
    Sound.load();

    // ---------------------------------------------------------- helpers
    function fmt(n, d) { return Number(n).toFixed(d === undefined ? 3 : d); }
    function pickTarget() {
      var t;
      do { t = MIN_TARGET + Math.floor(Math.random() * (MAX_TARGET - MIN_TARGET + 1)); }
      while (t === lastTarget); // avoid an immediate repeat
      lastTarget = t; return t;
    }
    function renderBudget() {
      var pctv = Math.min(100, (cumError / LIMIT) * 100);
      elFill.style.width = pctv + "%";
      elUsed.textContent = fmt(cumError);
      elMargin.textContent = fmt(Math.max(0, LIMIT - cumError)) + " s";
    }
    function setHud() { elScore.textContent = score; elBest.textContent = best; elRound.textContent = roundNum || "—"; }
    function updateModePill() { modePill.textContent = visibleMode ? "👁 Visible" : "🙈 Hidden"; }

    // ---------------------------------------------------------- flow
    function showStartCard() {
      state = "menu"; ready = false; busy = false;
      if (rafId) { cancelAnimationFrame(rafId); rafId = 0; }
      elBtn.disabled = true; elBtn.className = "btn-main"; elBtn.textContent = "START";
      elResult.textContent = ""; elTargetBig.textContent = "—"; elTargetLine.textContent = "get ready…"; elSub.textContent = "press start to begin";
      updateModePill();
      cardInner.innerHTML =
        '<h2>⏱ Stopwatch</h2>' +
        '<p>Tap <b>START</b> to begin a round, then <b>STOP</b> when you think the target time has passed.</p>' +
        '<div class="modepick">' +
          '<button class="modebtn" data-mode="hidden">🙈 Hidden<small>clock is hidden — estimate it</small></button>' +
          '<button class="modebtn" data-mode="visible">👁 Visible<small>clock ticks on screen — react</small></button>' +
        '</div>' +
        '<ul class="rules">' +
          '<li>Each round gives a target from <b>1&ndash;10&nbsp;seconds</b>.</li>' +
          '<li>Your miss = |your time &minus; target|, to the millisecond.</li>' +
          '<li>Misses <b>add up</b>. When the total passes <b>1.000&nbsp;s</b>, it&rsquo;s game over.</li>' +
          '<li>+1 point for every clock you stop in time.</li>' +
        '</ul>' +
        '<button class="btn" id="btn-start">Start game</button>';
      ovCard.classList.add("show");
      var btns = cardInner.querySelectorAll(".modebtn");
      function syncSel() { for (var i = 0; i < btns.length; i++) { var m = btns[i].getAttribute("data-mode") === "visible"; btns[i].classList.toggle("sel", m === visibleMode); } }
      for (var i = 0; i < btns.length; i++) btns[i].addEventListener("click", function () {
        visibleMode = this.getAttribute("data-mode") === "visible";
        try { localStorage.setItem("stopwatch_mode", visibleMode ? "visible" : "hidden"); } catch (e) {}
        syncSel(); updateModePill();
      });
      syncSel();
      $("btn-start").addEventListener("click", beginGame);
    }

    function beginGame() {
      Sound.init();
      score = 0; cumError = 0; roundNum = 0; lastTarget = 0;
      setHud(); renderBudget(); updateModePill(); elResult.textContent = "";
      ovCard.classList.remove("show");
      nextRound(); // no countdown — the player starts each round themselves
    }

    function nextRound() {
      roundNum++; target = pickTarget(); ready = true; busy = false; state = "ready";
      setHud();
      elResult.textContent = "";
      elBtn.disabled = false; elBtn.className = "btn-main"; elBtn.textContent = "START";
      elTargetLine.textContent = "stop the clock at";
      elTargetBig.innerHTML = target + '<small>s</small>';
      elSub.textContent = "tap START, then STOP when " + target + "s have passed";
    }

    function onStart() {
      if (!ready || busy) return;
      ready = false; state = "counting";
      startStamp = performance.now();
      elBtn.className = "btn-main stop counting"; elBtn.textContent = "STOP";
      if (visibleMode) {
        elTargetLine.textContent = "stop at " + target + "s";
        elTargetBig.innerHTML = '0.000<small>s</small>';
        elSub.textContent = "hit STOP right at " + fmt(target) + "s";
        rafId = requestAnimationFrame(tick);
      } else {
        elTargetLine.textContent = "counting… stop at";
        elTargetBig.innerHTML = target + '<small>s</small>';
        elSub.textContent = "the clock is hidden — trust your timing";
      }
      Sound.start();
    }
    // live clock readout (Visible mode only)
    function tick() {
      if (state !== "counting") { rafId = 0; return; }
      if (visibleMode) elTargetBig.innerHTML = fmt((performance.now() - startStamp) / 1000) + '<small>s</small>';
      rafId = requestAnimationFrame(tick);
    }

    function onStop() {
      if (state !== "counting") return;
      var elapsed = (performance.now() - startStamp) / 1000;
      if (elapsed < 0.2) return; // ignore an accidental double-tap (no target is below 1s)
      if (rafId) { cancelAnimationFrame(rafId); rafId = 0; }
      state = "result"; busy = true;
      elBtn.className = "btn-main"; elBtn.disabled = true; elBtn.textContent = "—";
      elTargetLine.textContent = "target was"; elTargetBig.innerHTML = target + '<small>s</small>';
      Sound.stop();

      var error = Math.abs(elapsed - target);
      var projected = cumError + error;
      var bust = projected > LIMIT + EPS;

      // result readout
      var col = error < 0.12 ? "var(--good)" : error < 0.30 ? "var(--warn)" : "var(--bad)";
      var late = elapsed >= target;
      elResult.innerHTML =
        '<div class="you">' + fmt(elapsed) + '<small style="font-size:1rem;color:var(--muted);">s</small></div>' +
        '<div class="delta" style="color:' + col + '">' + (late ? "over" : "under") + ' by ' + fmt(error) + 's</div>';

      if (bust) {
        Sound.fail();
        setTimeout(function () { gameOver({ round: roundNum, target: target, elapsed: elapsed, error: error, projected: projected }); }, 950);
        return;
      }

      // survived → score it
      cumError = projected; score++;
      if (error < 0.05) Sound.perfect(); else Sound.good();
      setHud(); renderBudget();
      setTimeout(nextRound, 1350);
    }

    function gameOver(info) {
      state = "gameover"; busy = false; ready = false;
      var record = score > best;
      if (record) { best = score; saveBest(best); }
      setHud();
      cardInner.innerHTML =
        '<h2>Game Over</h2>' +
        '<div class="big">' + score + '<small> pts</small></div>' +
        '<p>' + (record ? "🏆 new best!" : "best " + best) + '</p>' +
        '<div class="bust">' +
          'Round ' + info.round + ' · target <b>' + info.target + 's</b><br>' +
          'you stopped at <b>' + fmt(info.elapsed) + 's</b> — off by <b>' + fmt(info.error) + 's</b><br>' +
          'total would be ' + fmt(info.projected) + 's (over the 1.000s limit)' +
        '</div>' +
        '<button class="btn" id="btn-again">Play again</button>' +
        '<div style="margin-top:0.7rem;"><button class="btn ghost" id="btn-mode">change mode</button></div>';
      ovCard.classList.add("show");
      $("btn-again").addEventListener("click", beginGame);
      $("btn-mode").addEventListener("click", showStartCard);
    }

    // ---------------------------------------------------------- input
    function press() {
      if (state === "counting") onStop();
      else onStart(); // onStart no-ops unless we're in the ready state
    }
    // Use pointerdown (fires the instant of press) for accurate timing, and the
    // whole stage is a hit target so mobile taps are forgiving. The big button
    // lives inside .stage, so its presses bubble here too.
    var stageEl = document.querySelector(".stage");
    stageEl.addEventListener("pointerdown", function (e) {
      if (state === "counting" || state === "ready") { e.preventDefault(); press(); }
    });
    document.addEventListener("keydown", function (e) {
      if (e.code !== "Space" && e.code !== "Enter") return;
      e.preventDefault();
      if (e.repeat) return;
      // on the start / game-over overlays, Space/Enter activates the visible button
      if (ovCard.classList.contains("show")) { var b = cardInner.querySelector(".btn"); if (b) b.click(); return; }
      press();
    });

    // ---------------------------------------------------------- boot
    setHud(); renderBudget(); showStartCard();
  })();
  </script>
</body>
</html>
